
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#111118;--bg3:#1a1a24;
  --gold:#c9a84c;--gold2:#e8c870;--gold3:#f5e0a0;
  --txt:#f0ece0;--txt2:#b0aa98;--txt3:#6a6458;
  --border:#2a2836;--border2:#3d3a4e;
  --accent:#8b6fd4;--danger:#c94444;--success:#4a9e6a;
  --rad:8px;--rad2:14px;
}
body{background:var(--bg);color:var(--txt);font-family:Georgia,serif;min-height:100vh}
.sans{font-family:'Helvetica Neue',Arial,sans-serif}
h1{font-size:2.4rem;letter-spacing:0.08em;color:var(--gold2)}
h2{font-size:1.6rem;color:var(--gold2);margin-bottom:1rem}
h3{font-size:1.1rem;color:var(--gold);margin-bottom:.5rem}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:all .2s}
input,textarea,select{background:var(--bg3);color:var(--txt);border:1px solid var(--border2);border-radius:var(--rad);padding:.6rem .9rem;font-family:inherit;font-size:.95rem;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--gold);outline:none}
label{font-size:.85rem;color:var(--txt2);display:block;margin-bottom:.3rem}
.btn{padding:.65rem 1.4rem;border-radius:var(--rad);font-size:.9rem;font-weight:600;letter-spacing:.04em}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a10}
.btn-gold:hover{background:linear-gradient(135deg,var(--gold2),var(--gold3));transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:rgba(201,168,76,.12)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--txt2)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:.4rem .9rem;font-size:.82rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad2);padding:1.5rem}
.tag{display:inline-block;padding:.2rem .7rem;border-radius:20px;font-size:.78rem;letter-spacing:.05em}
.tag-gold{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);color:var(--gold)}
.tag-green{background:rgba(74,158,106,.15);border:1px solid rgba(74,158,106,.4);color:#6fd499}
.tag-red{background:rgba(201,68,68,.15);border:1px solid rgba(201,68,68,.4);color:#f08080}
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rad2);padding:2rem;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:1.3rem;color:var(--gold2);margin-bottom:1.2rem;font-family:Georgia,serif}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.gold-line{width:60px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:.8rem 0}
.stat{text-align:center;padding:1rem}
.stat-num{font-size:2rem;font-weight:700;color:var(--gold2)}
.stat-lbl{font-size:.8rem;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase}
.img-upload{border:2px dashed var(--border2);border-radius:var(--rad);padding:2rem;text-align:center;cursor:pointer;transition:.2s}
.img-upload:hover{border-color:var(--gold)}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.2rem}
.media-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad2);overflow:hidden}
.sponsor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1.5rem}
.sponsor-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad2);padding:1.5rem;text-align:center}
.vote-card{background:var(--bg2);border:2px solid var(--border2);border-radius:var(--rad2);padding:2rem;text-align:center;transition:.3s;cursor:pointer;flex:1}
.vote-card:hover{border-color:var(--gold);background:rgba(201,168,76,.05)}
.vote-card.selected{border-color:var(--gold2);background:rgba(201,168,76,.12)}
.progress-bar{height:8px;border-radius:4px;background:var(--bg3);overflow:hidden;margin:.5rem 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:.4s}
.admin-sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);min-height:100vh;padding:1.5rem 0;flex-shrink:0}
.admin-nav-item{padding:.75rem 1.5rem;font-size:.9rem;color:var(--txt2);cursor:pointer;transition:.2s;border-left:3px solid transparent;display:flex;align-items:center;gap:.6rem}
.admin-nav-item:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.admin-nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(201,168,76,.07)}
.gold-ornament{color:var(--gold3);letter-spacing:.2em;font-size:1.1rem}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;padding:.6rem .8rem;color:var(--txt3);border-bottom:1px solid var(--border);font-weight:600;font-family:'Helvetica Neue',sans-serif;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase}
td{padding:.7rem .8rem;border-bottom:1px solid var(--border);color:var(--txt2)}
tr:hover td{color:var(--txt)}
.scroll{overflow-y:auto}
</style>

<div id="app"></div>

<script>
const $ = id => document.getElementById(id);
const ce = (tag,props={},children=[]) => {
  const el = document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k==='class') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el[k]=v;
  });
  children.forEach(c=>c&&el.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return el;
};
const html = (parent,str) => { parent.innerHTML=str; };

// ─── State ───
let state = {
  page:'home', // home|tickets|vote|about|media|admin
  adminPage:'events',
  adminLogged:false,
  modal:null, // {type, data}
  data: {
    events:[],
    media:[],
    sponsors:[],
    settings:{whatsapp:'+77016202086',kaspiLink:'https://kaspi.kz/pay',kaspiMerchant:'',adminPass:'admin2024'},
    votes:{}
  },
  loaded:false,
  voteSession:{} // eventId -> {paid, voted, choice}
};

// ─── Storage ───
async function loadData(){
  try {
    const raw = localStorage.getItem('moldyr_data_v2');
    if(raw) {
      const d = JSON.parse(raw);
      state.data = {...state.data,...d};
      if(!state.data.settings.adminPass) state.data.settings.adminPass='admin2024';
    }
  } catch(e){}
  state.loaded=true;
  render();
}
async function saveData(){
  try{ localStorage.setItem('moldyr_data_v2',JSON.stringify(state.data)); }catch(e){}
}

// ─── Helpers ───
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmtDate(d){ if(!d)return''; const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('kk-KZ',{day:'numeric',month:'long',year:'numeric'}); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function getTodayEvent(){
  const t=todayStr();
  return state.data.events.find(e=>e.date===t&&e.active);
}
function navigate(p){ state.page=p; state.modal=null; render(); }
function openModal(type,data={}){ state.modal={type,data}; render(); }
function closeModal(){ state.modal=null; render(); }

// ─── File reader ───
function readFile(file){ return new Promise(res=>{
  const fr=new FileReader();
  fr.onload=e=>res(e.target.result);
  fr.readAsDataURL(file);
}); }

// ─── Navbar ───
function renderNavbar(root){
  const nav = ce('nav',{style:{position:'sticky',top:0,zIndex:100,background:'rgba(8,8,15,0.97)',backdropFilter:'blur(10px)',borderBottom:'1px solid var(--border)',padding:'0 2rem',display:'flex',alignItems:'center',justifyContent:'space-between',height:'70px'}});
  
  // Logo
  const logo = ce('div',{style:{display:'flex',alignItems:'center',gap:'.8rem',cursor:'pointer'},onClick:()=>navigate('home')});
  logo.innerHTML=`<div style="width:44px;height:44px;background:linear-gradient(135deg,#c9a84c,#e8c870);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem">✦</div><div><div style="font-size:1.05rem;font-weight:700;color:var(--gold2);letter-spacing:.08em">МӨЛДІР</div><div style="font-size:.7rem;color:var(--txt3);letter-spacing:.2em;text-transform:uppercase">ӨЛЕҢ</div></div>`;
  
  // Menu
  const menu = ce('div',{style:{display:'flex',gap:'0.2rem',alignItems:'center'}});
  const items = [
    {id:'tickets',label:'Билет алу'},
    {id:'vote',label:'Дауыс беру'},
    {id:'about',label:'Жоба туралы'},
    {id:'media',label:'БАҚ'}
  ];
  items.forEach(item=>{
    const btn = ce('button',{class:`btn btn-ghost btn-sm sans ${state.page===item.id?'active-nav':''}`,
      style:{borderColor:state.page===item.id?'var(--gold)':'transparent',color:state.page===item.id?'var(--gold)':'var(--txt2)',background:'none',borderRadius:'6px'},
      onClick:()=>navigate(item.id)},
      [item.label]);
    menu.appendChild(btn);
  });
  
  // Admin
  const adminBtn = ce('button',{class:'btn btn-sm',style:{marginLeft:'1rem',background:'rgba(201,168,76,.1)',border:'1px solid rgba(201,168,76,.3)',color:'var(--gold)',borderRadius:'6px'},
    onClick:()=>navigate('admin')},['⚙ Админ']);
  menu.appendChild(adminBtn);
  
  nav.appendChild(logo);
  nav.appendChild(menu);
  root.appendChild(nav);
}

// ─── Home Page ───
function renderHome(root){
  const todayEv = getTodayEvent();
  
  // Hero
  const hero = ce('div',{style:{textAlign:'center',padding:'5rem 2rem 3rem',position:'relative'}});
  hero.innerHTML=`
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,.06) 0%,transparent 70%);pointer-events:none"></div>
    <div style="font-size:.8rem;letter-spacing:.35em;color:var(--txt3);text-transform:uppercase;margin-bottom:1rem" class="sans">ҰЛТТЫҚ ПОЭЗИЯЛЫҚ ЖОБА</div>
    <h1 style="font-size:3.5rem;letter-spacing:.15em;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem">МӨЛДІР<br>ӨЛЕҢ</h1>
    <div class="gold-ornament" style="margin:1rem 0">✦ ✦ ✦</div>
    <p style="color:var(--txt2);max-width:500px;margin:0 auto 2rem;line-height:1.8;font-size:.95rem">Қазақстанның 20 өңірінен іріктелген ақындардың өнер сайысы. Алматы қаласында, "Ажурь" мейрамханасының терассасында.</p>
  `;
  root.appendChild(hero);
  
  // Today's event
  const section = ce('div',{style:{maxWidth:'900px',margin:'0 auto',padding:'0 2rem 4rem'}});
  
  if(todayEv){
    const box = ce('div',{style:{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--border2)',borderRadius:'18px',padding:'2.5rem',marginBottom:'2rem',position:'relative',overflow:'hidden'}});
    box.innerHTML=`
      <div style="position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,.06),transparent);pointer-events:none"></div>
      <div class="sans" style="font-size:.75rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:.8rem">БҮГІНГІ АЙТЫС • ${fmtDate(todayEv.date)} • ${todayEv.time}</div>
      <h2 style="font-size:1.8rem;margin-bottom:1.5rem;color:var(--txt)">Бүгін сайысқа шығатын өңірлер</h2>
      <div style="display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;margin-bottom:2rem">
        <div style="flex:1;min-width:180px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:1.5rem;text-align:center">
          <div style="font-size:1.4rem;margin-bottom:.3rem">🏴</div>
          <div style="font-size:1.1rem;color:var(--gold2);font-weight:600">${todayEv.region1||'1-өңір'}</div>
          <div style="font-size:.8rem;color:var(--txt3);margin-top:.3rem" class="sans">1-ҚАРСЫЛАС</div>
        </div>
        <div style="font-size:2rem;color:var(--txt3)">⚔</div>
        <div style="flex:1;min-width:180px;background:rgba(138,111,212,.07);border:1px solid rgba(138,111,212,.25);border-radius:12px;padding:1.5rem;text-align:center">
          <div style="font-size:1.4rem;margin-bottom:.3rem">🏴</div>
          <div style="font-size:1.1rem;color:var(--accent);font-weight:600">${todayEv.region2||'2-өңір'}</div>
          <div style="font-size:.8rem;color:var(--txt3);margin-top:.3rem" class="sans">2-ҚАРСЫЛАС</div>
        </div>
      </div>
      <div style="display:flex;gap:1rem;flex-wrap:wrap">
        <button class="btn btn-gold" onclick="navigate('vote')">Дауыс беру →</button>
        <button class="btn btn-outline" onclick="navigate('tickets')">Билет алу</button>
      </div>
    `;
    section.appendChild(box);
  } else {
    const noEv = ce('div',{style:{textAlign:'center',padding:'3rem',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'18px',marginBottom:'2rem'}});
    noEv.innerHTML=`<div style="font-size:2rem;margin-bottom:1rem">🌙</div><h3 style="color:var(--txt2)">Бүгін айтыс жоқ</h3><p style="color:var(--txt3);margin-top:.5rem">Кесте бойынша айтыстар әр сәрсенбі 19:00-де өтеді</p>`;
    section.appendChild(noEv);
  }
  
  // Upcoming
  const upcoming = state.data.events.filter(e=>e.date>todayStr()&&e.active).slice(0,3);
  if(upcoming.length){
    const upTitle = ce('h2',{style:{marginBottom:'1.2rem'}},['Алдағы айтыстар']);
    section.appendChild(upTitle);
    const grid = ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'1rem'}});
    upcoming.forEach(ev=>{
      const c = ce('div',{style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px',padding:'1.2rem',cursor:'pointer'},onClick:()=>navigate('tickets')});
      c.innerHTML=`
        <div class="sans" style="font-size:.75rem;color:var(--txt3);letter-spacing:.1em;margin-bottom:.5rem">${fmtDate(ev.date)} • ${ev.time}</div>
        <div style="font-size:.95rem;color:var(--gold);margin-bottom:.3rem">${ev.region1||'—'}</div>
        <div style="font-size:.8rem;color:var(--txt3);margin-bottom:.3rem">vs</div>
        <div style="font-size:.95rem;color:var(--accent)">${ev.region2||'—'}</div>
        <div style="margin-top:.8rem" class="tag tag-gold">${ev.ticketPrice?.toLocaleString('kk-KZ')||0} ₸</div>
      `;
      grid.appendChild(c);
    });
    section.appendChild(grid);
  }
  
  // Project info cards
  const stats = ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:'1rem',marginTop:'3rem'}});
  [['20','Өңір'],['60','Ақын'],['18','Кеш'],['100 000 ₸','Үлестірім']].forEach(([n,l])=>{
    const s=ce('div',{class:'stat card'});
    s.innerHTML=`<div class="stat-num">${n}</div><div class="stat-lbl">${l}</div>`;
    stats.appendChild(s);
  });
  section.appendChild(stats);
  
  root.appendChild(section);
}

// ─── Tickets Page ───
function renderTickets(root){
  const wrap = ce('div',{style:{maxWidth:'900px',margin:'0 auto',padding:'3rem 2rem'}});
  wrap.innerHTML=`<div class="sans" style="font-size:.75rem;letter-spacing:.3em;color:var(--txt3);text-transform:uppercase;margin-bottom:.5rem">БИЛЕТТЕР</div><h2>Билет алу</h2><p style="color:var(--txt2);margin-bottom:2rem;font-size:.9rem">Айтыс кешіне билет сатып алыңыз. Каспи арқылы төлем жасап, чекті WhatsApp-қа жіберіңіз.</p>`;
  
  const events = state.data.events.filter(e=>e.active&&e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date));
  
  if(!events.length){
    wrap.innerHTML+=`<div style="text-align:center;padding:3rem;color:var(--txt3)">Әзірше билет жоқ. Жақында қосылады.</div>`;
  } else {
    const grid = ce('div',{style:{display:'grid',gap:'1.2rem'}});
    events.forEach(ev=>{
      const card = ce('div',{class:'card',style:{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:'1.5rem',alignItems:'center'}});
      const pct = Math.round((ev.remainingTickets||0)/(ev.totalTickets||100)*100);
      card.innerHTML=`
        <div style="width:80px;height:80px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0">${ev.poster?`<img src="${ev.poster}" style="width:100%;height:100%;object-fit:cover;border-radius:10px">`:'📜'}</div>
        <div>
          <div class="sans" style="font-size:.78rem;color:var(--txt3);letter-spacing:.1em;margin-bottom:.3rem">${fmtDate(ev.date)} • ${ev.time||'19:00'}</div>
          <div style="font-size:1.05rem;color:var(--txt);margin-bottom:.5rem"><span style="color:var(--gold)">${ev.region1||'—'}</span> <span style="color:var(--txt3)">vs</span> <span style="color:var(--accent)">${ev.region2||'—'}</span></div>
          <div class="progress-bar" style="max-width:200px"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="sans" style="font-size:.78rem;color:var(--txt3)">${ev.remainingTickets||0} орын қалды / ${ev.totalTickets||100}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:1.3rem;color:var(--gold2);font-weight:700;margin-bottom:.5rem">${(ev.ticketPrice||0).toLocaleString('kk-KZ')} ₸</div>
          ${(ev.remainingTickets||0)>0?`<button class="btn btn-gold btn-sm" onclick="${countTotal(ev.seats||{})>0?`openSeatSelect('${ev.id}')`:`openBuyModal('${ev.id}')`}">Орын таңдау →</button>`:`<span class="tag tag-red">Таусылды</span>`}
        </div>
      `;
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
  }
  root.appendChild(wrap);
}
window.openBuyModal=function(eid){
  const ev=state.data.events.find(e=>e.id===eid);
  if(!ev) return;
  openModal('buy',{event:ev});
};
window.openSeatSelect=function(eid){
  const ev=state.data.events.find(e=>e.id===eid);
  if(!ev) return;
  openModal('seatSelect',{event:ev});
};

// ─── Vote Page ───
function renderVote(root){
  const wrap = ce('div',{style:{maxWidth:'750px',margin:'0 auto',padding:'3rem 2rem'}});
  wrap.innerHTML=`<div class="sans" style="font-size:.75rem;letter-spacing:.3em;color:var(--txt3);text-transform:uppercase;margin-bottom:.5rem">ДАУЫС БЕРУ</div><h2>Дауыс беру</h2>`;
  
  const todayEv = getTodayEvent();
  
  if(!todayEv){
    const msg = ce('div',{style:{textAlign:'center',padding:'4rem 2rem',color:'var(--txt3)'}});
    msg.innerHTML=`<div style="font-size:3rem;margin-bottom:1rem">🎙</div><h3 style="color:var(--txt2);margin-bottom:.5rem">Бүгін айтыс жоқ</h3><p>Дауыс беру тек айтыс күні ғана қолжетімді (сәрсенбі 19:00)</p>`;
    wrap.appendChild(msg);
    root.appendChild(wrap);
    return;
  }
  
  const vs = state.voteSession[todayEv.id]||{};
  
  const info = ce('div',{style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px',padding:'1.5rem',marginBottom:'2rem'}});
  info.innerHTML=`<div class="sans" style="font-size:.78rem;color:var(--gold);letter-spacing:.2em;margin-bottom:.5rem">БҮГІНГІ АЙТЫС • ${fmtDate(todayEv.date)} • ${todayEv.time}</div><div style="font-size:1.1rem"><span style="color:var(--gold)">${todayEv.region1}</span> <span style="color:var(--txt3);margin:0 .5rem">vs</span> <span style="color:var(--accent)">${todayEv.region2}</span></div>`;
  wrap.appendChild(info);
  
  if(vs.voted){
    const done = ce('div',{style:{textAlign:'center',padding:'3rem',background:'rgba(74,158,106,.07)',border:'1px solid rgba(74,158,106,.3)',borderRadius:'14px'}});
    done.innerHTML=`<div style="font-size:2.5rem;margin-bottom:1rem">✅</div><h3 style="color:#6fd499;margin-bottom:.5rem">Дауысыңыз қабылданды!</h3><p style="color:var(--txt2)">Сіз <strong style="color:var(--gold)">${vs.choice===1?todayEv.region1:todayEv.region2}</strong> командасына дауыс бердіңіз</p>`;
    wrap.appendChild(done);
    root.appendChild(wrap);
    return;
  }
  
  // Votes count display
  const votes = state.data.votes[todayEv.id]||{r1:0,r2:0,list:[]};
  const total = votes.r1+votes.r2;
  const voteInfo = ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'2rem'}});
  voteInfo.innerHTML=`

window.submitVote=function(eid,choice){
  if(!state.data.votes[eid]) state.data.votes[eid]={r1:0,r2:0,list:[]};
  if(choice===1) state.data.votes[eid].r1++;
  else state.data.votes[eid].r2++;
  state.data.votes[eid].list.push({ts:Date.now(),choice,token:uid()});
  state.voteSession[eid]={...state.voteSession[eid],voted:true};
  saveData();
  render();
};

window.adjustVote=function(eid,region,delta){
  if(!state.data.votes[eid]) state.data.votes[eid]={r1:0,r2:0,list:[]};
  if(region==='reset'){ state.data.votes[eid]={r1:0,r2:0,list:[]}; }
  else { state.data.votes[eid][region]=Math.max(0,(state.data.votes[eid][region]||0)+delta); }
  saveData(); render();
};

// ─── Seat System ───
function rowLabel(i){ return String.fromCharCode(65+i); }
function buildSeats(cfg, old={}){
  const s={};
  const rows=Number(cfg.rowCount||8);
  const cols=Number(cfg.colCount||10);
  for(let r=0;r<rows;r++){
    const rl=rowLabel(r);
    for(let c=1;c<=cols;c++){
      const k=`${rl}-${c}`;
      if((cfg.disabled||[]).includes(k)) continue;
      s[k]=old[k]||'free';
    }
  }
  return s;
}
function seatPrice(k,cfg){
  const row=k.split('-')[0];
  return Number((cfg.rowPrices||{})[row]||cfg.basePrice||0);
}
function countFree(seats){ return Object.values(seats||{}).filter(v=>v==='free').length; }
function countTotal(seats){ return Object.keys(seats||{}).length; }

function renderSeatMap(ev, opts={}){
  // opts: { isAdmin, selected, onSeatClick }
  const cfg=ev.seatConfig||{rowCount:8,colCount:10,basePrice:ev.ticketPrice||3000,rowPrices:{},disabled:[]};
  const seats=ev.seats||{};
  const rows=Number(cfg.rowCount||8);
  const cols=Number(cfg.colCount||10);
  const selected=opts.selected||{};

  const wrap=ce('div',{style:{overflowX:'auto'}});
  const inner=ce('div',{style:{display:'inline-block',minWidth:'100%'}});

  // Legend
  const leg=ce('div',{style:{display:'flex',gap:'1rem',marginBottom:'1rem',flexWrap:'wrap'}});
  const legItems=[['free','var(--bg3)','var(--gold)','Бос'],['taken','rgba(201,68,68,.2)','rgba(201,68,68,.6)','Брондалған'],['selected','rgba(201,168,76,.3)','var(--gold2)','Таңдалған']];
  legItems.forEach(([,bg,border,label])=>{
    const li=ce('div',{style:{display:'flex',alignItems:'center',gap:'.4rem',fontSize:'.78rem',color:'var(--txt3)'}});
    li.innerHTML=`<div style="width:18px;height:18px;border-radius:3px;background:${bg};border:2px solid ${border}"></div>${label}`;
    leg.appendChild(li);
  });
  inner.appendChild(leg);

  // Stage bar
  const stage=ce('div',{style:{textAlign:'center',marginBottom:'1rem'}});
  stage.innerHTML=`<div style="height:8px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:4px;margin-bottom:4px;opacity:.5"></div><div style="font-size:.7rem;letter-spacing:.2em;color:var(--txt3)" class="sans">САХНА</div>`;
  inner.appendChild(stage);

  // Grid
  for(let r=0;r<rows;r++){
    const rl=rowLabel(r);
    const row=ce('div',{style:{display:'flex',alignItems:'center',gap:'4px',marginBottom:'4px'}});
    // Row label
    const lbl=ce('div',{style:{width:'22px',flexShrink:0,textAlign:'center',fontSize:'.75rem',color:'var(--txt3)',fontWeight:600}},[rl]);
    row.appendChild(lbl);
    for(let c=1;c<=cols;c++){
      const k=`${rl}-${c}`;
      if((cfg.disabled||[]).includes(k)){
        const gap=ce('div',{style:{width:'30px',height:'30px',flexShrink:0}});
        row.appendChild(gap);
        continue;
      }
      const status=seats[k]||'free';
      const isSel=!!selected[k];
      const price=seatPrice(k,cfg);
      let bg='var(--bg3)',border='rgba(201,168,76,.3)',color='var(--txt3)',cursor='pointer';
      if(isSel){bg='rgba(201,168,76,.3)';border='var(--gold2)';color='var(--gold)';}
      else if(status==='disabled'){bg='rgba(80,80,80,.15)';border='rgba(80,80,80,.3)';color='rgba(80,80,80,.4)';cursor=opts.isAdmin?'pointer':'default';}
      else if(status==='taken'){bg='rgba(201,68,68,.15)';border='rgba(201,68,68,.5)';color='rgba(201,68,68,.7)';cursor=opts.isAdmin?'pointer':'default';}
      const seat=ce('div',{
        style:{width:'30px',height:'30px',borderRadius:'4px 4px 2px 2px',border:`2px solid ${border}`,background:bg,color,cursor,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'8px',fontWeight:600,transition:'all .15s',title:`${k} — ${price.toLocaleString()} ₸`},
        title:`${k} — ${price.toLocaleString()} ₸`
      },[String(c)]);
      if(opts.onSeatClick && (status==='free'||isSel||opts.isAdmin)){
        seat.style.cursor='pointer';
        seat.addEventListener('click',()=>opts.onSeatClick(k,status,isSel));
      }
      if(status==='taken'&&!opts.isAdmin){seat.textContent='✕';}
      row.appendChild(seat);
    }
    inner.appendChild(row);
  }
  wrap.appendChild(inner);
  return wrap;
}

  const {type,data}=state.modal;
  
  if(type==='buy') renderBuyModal(root,data);

  else if(type==='seatBuilder') renderSeatBuilderModal(root,data);
  else if(type==='adminSeatMap') renderAdminSeatMapModal(root,data);
  else if(type==='seatSelect') renderSeatSelectModal(root,data);
}

function renderSeatBuilderModal(root,{eid}){
  const ev=state.data.events.find(e=>e.id===eid);
  if(!ev) return;
  const cfg=ev.seatConfig||{rowCount:8,colCount:10,basePrice:ev.ticketPrice||3000,rowPrices:{},disabled:[]};
  // local builder state
  let bRows=Number(cfg.rowCount||8);
  let bCols=Number(cfg.colCount||10);
  let bBase=Number(cfg.basePrice||3000);
  let bRowPrices={...( cfg.rowPrices||{})};
  let bDisabled=[...(cfg.disabled||[])];

  const bg=ce('div',{class:'modal-bg',onClick:(e)=>{if(e.target===bg)closeModal();}});
  const m=ce('div',{class:'modal',style:{maxWidth:'780px',width:'95%'}});

  function rebuild(){
    m.innerHTML='';
    m.appendChild(buildSeatBuilderContent());
  }

  function buildSeatBuilderContent(){
    const wrap=ce('div');
    wrap.innerHTML=`<div class="modal-title">⚙ Орын орналастыру — ${ev.region1} vs ${ev.region2}</div>`;

    // Config row
    const cfgRow=ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.8rem',marginBottom:'1rem'}});
    cfgRow.innerHTML=`
      <div><label>Қатар саны (A-Z)</label><input type="number" id="sb-rows" min="1" max="26" value="${bRows}"></div>
      <div><label>Бір қатарда орын</label><input type="number" id="sb-cols" min="1" max="30" value="${bCols}"></div>
      <div><label>Негізгі баға (₸)</label><input type="number" id="sb-base" min="0" value="${bBase}"></div>
    `;
    wrap.appendChild(cfgRow);

    // Row price overrides
    const rpWrap=ce('div',{style:{marginBottom:'1rem'}});
    rpWrap.innerHTML=`<label style="margin-bottom:.5rem;display:block">Қатар бойынша баға (бос қалдырсаңыз негізгі баға)</label>`;
    const rpGrid=ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:'.4rem'}});
    for(let r=0;r<bRows;r++){
      const rl=rowLabel(r);
      const inp=ce('input',{type:'number',id:`sb-rp-${rl}`,placeholder:`${rl} қатар ₸`,value:bRowPrices[rl]||'',style:{fontSize:'.82rem',padding:'.4rem .6rem'}});
      rpGrid.appendChild(inp);
    }
    rpWrap.appendChild(rpGrid);
    wrap.appendChild(rpWrap);

    // Hint
    const hint=ce('div',{style:{fontSize:'.8rem',color:'var(--txt3)',marginBottom:'.8rem'}});
    hint.textContent='Орынды өшіру үшін орынды басыңыз (сұр болады). Қайта басу қосады.';
    wrap.appendChild(hint);

    // Preview map
    const previewCfg={rowCount:bRows,colCount:bCols,basePrice:bBase,rowPrices:bRowPrices,disabled:bDisabled};
    const mockEv={...ev,seatConfig:previewCfg,seats:{}};
    bDisabled.forEach(k=>{ mockEv.seats[k]='disabled'; });
    const mapWrap=ce('div',{style:{marginBottom:'1rem',border:'1px solid var(--border)',borderRadius:'8px',padding:'1rem',background:'var(--bg)'}});
    const mapEl=renderSeatMap(mockEv,{
      isAdmin:true,
      onSeatClick:(k)=>{
        const idx=bDisabled.indexOf(k);
        if(idx>=0) bDisabled.splice(idx,1); else bDisabled.push(k);
        rebuild();
      }
    });
    mapWrap.appendChild(mapEl);
    wrap.appendChild(mapWrap);

    const btnRow=ce('div',{style:{display:'flex',gap:'.5rem',flexWrap:'wrap'}});

    const applyBtn=ce('button',{class:'btn btn-ghost btn-sm',onClick:()=>{
      bRows=Number(document.getElementById('sb-rows')?.value||bRows);
      bCols=Number(document.getElementById('sb-cols')?.value||bCols);
      bBase=Number(document.getElementById('sb-base')?.value||bBase);
      for(let r=0;r<bRows;r++){
        const rl=rowLabel(r);
        const v=document.getElementById(`sb-rp-${rl}`)?.value;
        if(v) bRowPrices[rl]=Number(v); else delete bRowPrices[rl];
      }
      rebuild();
    }},['👁 Алдын ала қарау']);

    const saveBtn=ce('button',{class:'btn btn-gold',onClick:()=>{
      bRows=Number(document.getElementById('sb-rows')?.value||bRows);
      bCols=Number(document.getElementById('sb-cols')?.value||bCols);
      bBase=Number(document.getElementById('sb-base')?.value||bBase);
      for(let r=0;r<bRows;r++){
        const rl=rowLabel(r);
        const v=document.getElementById(`sb-rp-${rl}`)?.value;
        if(v) bRowPrices[rl]=Number(v); else delete bRowPrices[rl];
      }
      const newCfg={rowCount:bRows,colCount:bCols,basePrice:bBase,rowPrices:{...bRowPrices},disabled:[...bDisabled]};
      ev.seatConfig=newCfg;
      ev.seats=buildSeats(newCfg, ev.seats||{});
      ev.totalTickets=countTotal(ev.seats);
      ev.remainingTickets=countFree(ev.seats);
      saveData(); closeModal();
    }},['💾 Сақтау']);

    const cancelBtn=ce('button',{class:'btn btn-ghost',onClick:closeModal},['Болдырмау']);
    btnRow.appendChild(applyBtn);
    btnRow.appendChild(saveBtn);
    btnRow.appendChild(cancelBtn);
    wrap.appendChild(btnRow);
    return wrap;
  }

  m.appendChild(buildSeatBuilderContent());
  bg.appendChild(m);
  root.appendChild(bg);
}

// ─── Admin Seat Map Modal ───
function renderAdminSeatMapModal(root,{eid}){
  const ev=state.data.events.find(e=>e.id===eid);
  if(!ev) return;
  const bg=ce('div',{class:'modal-bg',onClick:(e)=>{if(e.target===bg)closeModal();}});
  const m=ce('div',{class:'modal',style:{maxWidth:'800px',width:'95%'}});

  function rebuild(){
    m.innerHTML='';
    const free=countFree(ev.seats||{});
    const total=countTotal(ev.seats||{});
    m.innerHTML=`<div class="modal-title">🗺 Орын картасы — ${fmtDate(ev.date)}</div><div style="font-size:.85rem;color:var(--txt2);margin-bottom:1rem">Орынды басу арқылы бос/брондалған деп белгілеңіз. Бос: <strong style="color:var(--gold)">${free}</strong> / ${total}</div>`;
    const mapEl=renderSeatMap(ev,{isAdmin:true,onSeatClick:(k)=>{ adminToggleSeat(eid,k); rebuild(); }});
    m.appendChild(mapEl);
    const btnRow=ce('div',{style:{display:'flex',gap:'.5rem',marginTop:'1rem',flexWrap:'wrap'}});
    const freeAllBtn=ce('button',{class:'btn btn-outline btn-sm',onClick:()=>{ Object.keys(ev.seats||{}).forEach(k=>ev.seats[k]='free'); saveData(); rebuild(); }},['✓ Барлығын босату']);
    const closeBtn=ce('button',{class:'btn btn-ghost',onClick:closeModal},['Жабу']);
    btnRow.appendChild(freeAllBtn);
    btnRow.appendChild(closeBtn);
    m.appendChild(btnRow);
  }

  rebuild();
  bg.appendChild(m);
  root.appendChild(bg);
}

// ─── Public Seat Select Modal ───
function renderSeatSelectModal(root,{event:ev}){
  let selected={};
  const cfg=ev.seatConfig||{};
  const bg=ce('div',{class:'modal-bg',onClick:(e)=>{if(e.target===bg)closeModal();}});
  const m=ce('div',{class:'modal',style:{maxWidth:'820px',width:'95%'}});

  function getTotal(){ return Object.keys(selected).reduce((s,k)=>s+seatPrice(k,cfg),0); }

  function rebuild(){
    m.innerHTML='';
    m.innerHTML=`<div class="modal-title">🎟 Орын таңдаңыз — ${fmtDate(ev.date)}</div>`;

    const mapEl=renderSeatMap(ev,{
      selected,
      onSeatClick:(k,status,isSel)=>{
        if(status==='taken') return;
        if(isSel) delete selected[k]; else selected[k]=true;
        rebuild();
      }
    });
    m.appendChild(mapEl);

    // Selected summary
    const keys=Object.keys(selected);
    const summary=ce('div',{style:{marginTop:'1rem',padding:'1rem',background:'var(--bg3)',borderRadius:'8px',border:'1px solid var(--border)'}});
    if(keys.length===0){
      summary.innerHTML=`<div style="color:var(--txt3);font-size:.85rem;text-align:center">Орын таңдаңыз</div>`;
    } else {
      summary.innerHTML=`<div style="font-size:.82rem;color:var(--txt3);margin-bottom:.5rem">Таңдалған орындар:</div><div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.8rem">${keys.map(k=>`<span class="tag tag-gold">${k} — ${seatPrice(k,cfg).toLocaleString()} ₸</span>`).join('')}</div><div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:.8rem"><span style="font-size:.85rem;color:var(--txt2)">Жиыны:</span><span style="font-size:1.3rem;font-weight:700;color:var(--gold2)">${getTotal().toLocaleString()} ₸</span></div>`;
    }
    m.appendChild(summary);

    // Payment buttons
    const btns=ce('div',{style:{display:'flex',gap:'.6rem',marginTop:'1rem',flexWrap:'wrap'}});
    if(keys.length>0){
      const kaspiBtn=ce('a',{
        href:state.data.settings.kaspiLink||'https://kaspi.kz/pay',
        target:'_blank',
        class:'btn btn-gold',
        style:{textDecoration:'none',flex:1,textAlign:'center'}
      },[`Каспи арқылы ${getTotal().toLocaleString()} ₸ төлеу →`]);
      const waMsg=`Орындар: ${keys.join(', ')} | ${fmtDate(ev.date)} ${ev.region1} vs ${ev.region2} | Жиыны: ${getTotal().toLocaleString()} ₸`;
      const waBtn=ce('a',{
        href:`https://wa.me/${(state.data.settings.whatsapp||'').replace(/\D/g,'')}?text=${encodeURIComponent(waMsg)}`,
        target:'_blank',
        class:'btn btn-outline',
        style:{textDecoration:'none',flex:1,textAlign:'center'}
      },['WhatsApp-қа жіберу']);
      btns.appendChild(kaspiBtn);
      btns.appendChild(waBtn);
    }
    const closeBtn=ce('button',{class:'btn btn-ghost',style:{width:'100%'},onClick:closeModal},['Болдырмау']);
    btns.appendChild(closeBtn);
    m.appendChild(btns);
  }

  rebuild();
  bg.appendChild(m);
  root.appendChild(bg);
}

// ─── Footer ───
function renderFooter(root){
  const footer=ce('footer',{style:{borderTop:'1px solid var(--border)',padding:'2rem',textAlign:'center',marginTop:'4rem'}});
  footer.innerHTML=`<div class="gold-ornament" style="margin-bottom:.8rem">✦ МӨЛДІР ӨЛЕҢ ✦</div><p style="color:var(--txt3);font-size:.82rem">© 2025–2026 • Алматы • Жоба авторы: Мөлдір Айтбай • <a href="https://instagram.com/maitbay" target="_blank" style="color:var(--gold)">@maitbay</a></p>`;
  root.appendChild(footer);
}

// ─── Main Render ───
function render(){
  const app=$('app');
  app.innerHTML='';
  
  if(state.page==='admin'){
    renderNavbar(app);
    renderAdmin(app);
    renderModal(app);
    return;
  }
  
  renderNavbar(app);
  
  const main=ce('main',{});
  if(state.page==='home') renderHome(main);
  else if(state.page==='tickets') renderTickets(main);
  else if(state.page==='vote') renderVote(main);
  else if(state.page==='about') renderAbout(main);
  else if(state.page==='media') renderMedia(main);
  app.appendChild(main);
  
  renderFooter(app);
  renderModal(app);
}

// make nav and modal functions global
window.navigate=navigate;
window.openModal=openModal;
window.closeModal=closeModal;

// Init
loadData();
</script>
